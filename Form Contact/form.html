<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./IMGs/icono.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Oswald:wght@200..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <title>Formulario de Contacto</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header data-aos="fade-left">
           <nav class="nav">
        <div>
            <ul class="nav__ul">
                <li class="nav__item"><a class="nav__link link--back" href="../index.html">Volver</a></li>
            </ul>
        </div>
        <div>
            <img class="nav__img" src="../IMGs/navbar icon.png" alt="">
        </div>     
    </nav>
    </header>
    <main class="main">
    <div class="container" data-aos="fade-up">
            <div class="contenedor_h1">
            <h1>Formulario De Contacto<span class="guion_parpadeo">|</span></h1>
        </div>
        <form>
            <fieldset class="form__fieldset">
                <legend class=>INFORMACION PERSONAL</legend>
                <label for="">Nombre Completo</label>
                <input type="text" class="form__input" placeholder="Jhon Doe">
                <label for="">Correo Electronico</label>
                <input type="email" class="form__input" placeholder="Ejemplo@gmail.com">
                <label for="">Tipo</label>
                <select name="" id="" class="form__input">
                    <option value="emprise">Empresa</option>
                    <option value="comerce">Comercio</option>
                    <option value="independence">Independiente</option>
                    <option value="other">Otro</option>
                </select>
            </fieldset>
            <fieldset class="form__fieldset">
                <legend class=>MENSAJE</legend>
                <label for="">Contactate conmigo!</label>
                <textarea name="" id="" class="form__textarea" placeholder="Deja tu mensaje"></textarea>
            </fieldset>
            <input type="submit" type="buttom" class="btn-submit">
        </form>
    </div>
    </main>
    <footer class="footer">
        <p class="footer__text">© 2026 Pagina desarrollada por Agustín E. Cuevas desde Argentina!. Todos los derechos reservados.</p>
    </footer>
    
    
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
    AOS.init();
  </script>
</body>
</html>
